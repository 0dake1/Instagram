<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>遊びプラン</title>

  <style>
    body {
      font-family: sans-serif;
      max-width: 500px;
      margin: 0 auto;
      padding: 20px;
      background: #f5f5f5;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .title {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .desc {
      color: #555;
      margin-bottom: 12px;
      line-height: 1.5;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: black;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <h2>遊びプラン</h2>

  <div class="card">
    <div class="title">休日ランチ</div>

    <div class="desc">
      渋谷や表参道でゆっくりランチ。<br>
      カフェ巡りでもOK。
    </div>

    <button onclick="sendDM('休日ランチ')">
      提案する
    </button>
  </div>

  <div class="card">
    <div class="title">映画とご飯</div>

    <div class="desc">
      映画を観たあとにご飯。<br>
      夜の時間帯を想定しています。
    </div>

    <button onclick="sendDM('映画とご飯')">
      提案する
    </button>
  </div>

  <script>
    function sendDM(menu) {
      const text =
`【遊びリクエスト】
${menu}に興味あります！`;

      const url =
"https://www.instagram.com/direct/new/?text="
+ encodeURIComponent(text);

      window.open(url, "_blank");
    }
  </script>

</body>
</html>
