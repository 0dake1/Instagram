<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>お品書き</title>

  <style>
    body {
      font-family: sans-serif;
      max-width: 500px;
      margin: 0 auto;
      padding: 20px;
      background: #f5f5f5;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .title {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .desc {
      color: #555;
      margin-bottom: 12px;
      line-height: 1.5;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: black;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <h2>お品書き</h2>
  <div>
    もっと気軽にひとを誘える世界線があればいいと思いませんか？<br>
    ということでメニューはこちらでご準備しました。
    <br><br>
  </div>

  <div class="card">
    <div class="title">朝からヒーコー☕</div>

    <div class="desc">
      朝から"おしゃれ"なカフェ行ってQOL高めるやつ
    </div>

    <button onclick="sendDM('朝からヒーコー☕')">
      DMでリクエストを送る
    </button>
  </div>

  <div class="card">
    <div class="title">まったりピクニック🌳</div>

    <div class="desc">
      都内のきれいめでか公園でゆっくりまったりパン食べたい
    </div>

    <button onclick="sendDM('まったりピクニック🌳')">
      DMでリクエストを送る
    </button>
  </div>

  <div class="card">
    <div class="title">第n回カタン大会🎲</div>

    <div class="desc">
      そろそろ誰が一番か決めましょうか
    </div>

    <button onclick="sendDM('第n回カタン大会🎲')">
      DMでリクエストを送る
    </button>
  </div>

  <script>
    function sendDM(menu) {
      const text =
`【遊びリクエスト】
${menu}したい！`;

      const url =
"https://www.instagram.com/direct/new/?text="
+ encodeURIComponent(text);

      window.open(url, "_blank");
    }
  </script>

</body>
</html>
